name: Generate Live Timestamp
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Crucial for PRs: Checks out the actual branch instead of a detached HEAD
          ref: ${{ github.head_ref || github.ref }}

      - name: Generate Timestamp
        run: |
          COMMIT_TITLE=$(git log -1 --format=%s)
          jq -n --arg ver "$(date +%s)" --arg title "$COMMIT_TITLE" '{version: $ver, title: $title}' > version.json

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff-index --quiet HEAD || git commit -m "chore: update build timestamp [skip ci]"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
