<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR Camera & Node Builder</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
            user-select: none;
            color: white;
            -webkit-user-select: none;
        }

        /* --- Top Navigation --- */
        #top-nav {
            display: flex;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            gap: 15px;
            z-index: 50;
        }

        .nav-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            backdrop-filter: blur(5px);
            transition: background 0.2s;
        }

        .nav-btn:hover { background: rgba(255, 255, 255, 0.3); }
        .nav-btn.active { background: rgba(255, 255, 255, 0.4); box-shadow: inset 0 0 5px rgba(0,0,0,0.5); }

        /* --- View Containers --- */
        .view-container {
            flex: 1;
            position: relative;
            display: none;
            width: 100%;
            height: calc(100vh - 60px);
        }
        .view-container.active { display: flex; }

        /* --- Camera Mode Styles --- */
        #video-container {
            display: flex;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
        }

        .video-wrapper {
            width: 50%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
            position: relative;
        }

        .video-feed { width: 100%; height: 100%; object-fit: cover; }
        #single-video { width: 100%; height: 100%; object-fit: cover; display: none; }

        .canvas-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        .effect-canvas { width: 100%; height: 100%; }

        #controls-panel {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px; z-index: 10;
            transition: opacity 0.3s ease, transform 0.3s ease;
            display: flex; flex-direction: column; gap: 10px;
        }

        #controls-panel.hidden {
            opacity: 0; pointer-events: none; transform: translateY(20px);
        }

        .controls-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .info-row { display: flex; justify-content: center; gap: 20px; color: white; font-size: 14px; margin-top: 5px; }

        button {
            padding: 10px 20px; background: rgba(255, 255, 255, 0.2);
            color: white; border: none; border-radius: 5px;
            cursor: pointer; font-size: 16px; backdrop-filter: blur(5px);
        }
        button:hover { background: rgba(255, 255, 255, 0.3); }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* --- Node Builder Mode Styles --- */
        #builder-layout {
            display: flex; width: 100%; height: 100%; background: #000; position: relative;
        }

        /* Sidebar Panels */
        .sidebar {
            width: 260px; background: rgba(15, 15, 15, 0.95);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column;
            padding: 15px; gap: 10px; overflow-y: auto;
            backdrop-filter: blur(15px); flex-shrink: 0; z-index: 20;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #scripts-panel { border-right: none; border-left: 1px solid rgba(255,255,255,0.1); }

        .panel-title {
            font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 5px; text-align: center;
        }

        .palette-block {
            padding: 10px; border-radius: 5px; background: rgba(255, 255, 255, 0.15);
            cursor: pointer; font-size: 14px; display: flex; justify-content: space-between; align-items: center;
            transition: background 0.2s;
        }
        .palette-block:hover { background: rgba(255, 255, 255, 0.25); }

        .var-group {
            display: flex; flex-direction: column; gap: 2px;
            background: rgba(0,0,0,0.3); padding: 8px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.05);
        }
        .var-group label { display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; color: #3b82f6;}

        /* Node Workspace */
        #workspace-viewport {
            flex: 1; position: relative; overflow: hidden; background: #000; cursor: grab;
            touch-action: none; 
        }
        #workspace-viewport.panning { cursor: grabbing !important; }

        #workspace-inner {
            width: 4000px; height: 4000px; position: relative;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            transform-origin: 0 0; /* Important for clean zooming */
            transform: scale(1);
        }

        #builder-preview {
            position: fixed; bottom: 20px; right: 20px;
            width: 320px; height: 240px; background: rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 8px;
            z-index: 10; pointer-events: none; box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        #preview-canvas { width: 100%; height: 100%; object-fit: contain; }

        #wires-svg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;
        }

        .wire { fill: none; stroke: rgba(255,255,255,0.6); stroke-width: 3; pointer-events: stroke; cursor: pointer; transition: stroke 0.2s; }
        .wire:hover { stroke: rgba(255,255,255,1); }
        .wire.active { stroke: #3b82f6; stroke-dasharray: 5,5; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -10; } }

        .node {
            position: absolute; background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
            min-width: 200px; z-index: 2; box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; cursor: default;
        }
        .node.error { border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }

        .node-header {
            padding: 10px 12px; background: rgba(255,255,255,0.1);
            border-top-left-radius: 7px; border-top-right-radius: 7px;
            cursor: grab; display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; font-size: 14px; touch-action: none;
        }
        .node-header:active { cursor: grabbing; }

        .node-actions { display: flex; gap: 5px; }
        .node-btn {
            background: transparent; color: #aaa; border: none; padding: 2px 6px; min-width: auto;
            font-size: 12px; cursor: pointer; border-radius: 3px; font-weight: bold;
        }
        .node-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .node-btn.delete:hover { background: #ef4444; color: #fff; }

        .node-body { padding: 12px; display: flex; flex-direction: column; gap: 12px; font-size: 12px; }

        .port-row { display: flex; justify-content: space-between; position: relative; }
        .port-label { color: #bbb; }
        
        .port {
            width: 16px; height: 16px; background: #fff; border-radius: 50%;
            position: absolute; top: 50%; transform: translateY(-50%);
            cursor: crosshair; border: 2px solid #333; z-index: 3;
            transition: transform 0.1s, background 0.2s, box-shadow 0.2s; touch-action: none;
        }
        .port:hover { transform: translateY(-50%) scale(1.3); background: #3b82f6;}
        
        /* Pending connection styles */
        .port.pending {
            background: #3b82f6;
            transform: translateY(-50%) scale(1.4);
            box-shadow: 0 0 12px #3b82f6;
        }

        .port-in { left: -20px; }
        .port-out { right: -20px; }

        .param-group { display: flex; flex-direction: column; gap: 4px; }
        .param-header { display: flex; justify-content: space-between; align-items: center; }
        
        .var-bind-select {
            background: transparent; color: #3b82f6; border: 1px solid #3b82f6; 
            border-radius: 3px; font-size: 10px; padding: 1px 3px; min-width: auto; height: 18px; cursor: pointer; margin-right: 5px;
        }
        .var-bind-select.active { background: #3b82f6; color: white; }
        .var-bind-select option { background: #111; color: white; }

        input[type="range"] { width: 100%; cursor: pointer; }
        input[type="range"]:disabled { opacity: 0.3; cursor: not-allowed; }
        
        select.node-select { padding: 6px; background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 4px; width: 100%; }
        select.node-select option { background: #333; }

        .script-item {
            padding: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; margin-bottom: 5px;
        }
        .script-item:hover { background: rgba(255,255,255,0.2); }

        /* --- Mobile Overrides --- */
        #mobile-bottom-bar { display: none; }
        #sidebar-overlay { display: none; }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute; top: 0; bottom: 0; height: calc(100vh - 60px);
                box-shadow: 0 0 20px rgba(0,0,0,0.8);
            }
            #palette-panel { left: 0; transform: translateX(-100%); }
            #palette-panel.open { transform: translateX(0); }
            
            #scripts-panel { right: 0; transform: translateX(100%); }
            #scripts-panel.open { transform: translateX(0); }
            
            #sidebar-overlay {
                display: block; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.6); z-index: 15; opacity: 0; pointer-events: none; transition: opacity 0.3s;
            }
            #sidebar-overlay.active { opacity: 1; pointer-events: auto; }

            #mobile-bottom-bar {
                display: flex; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
                gap: 10px; z-index: 10;
            }
            #mobile-bottom-bar button { font-size: 14px; padding: 10px 15px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); background: rgba(30,30,30,0.9); border: 1px solid #444; }
            #mobile-bottom-bar button:active { background: #333; }
            
            #builder-preview {
                width: 140px; height: 105px; bottom: 60px; right: 10px; opacity: 0.8;
            }
        }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100;
            display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal { background: #111; padding: 20px; border-radius: 8px; width: 90%; max-width: 350px; border: 1px solid rgba(255,255,255,0.2); }
        .modal input { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #444; background: #222; color: white; margin: 15px 0; }

    </style>
</head>
<body>

    <!-- Top Navigation -->
    <nav id="top-nav">
        <button class="nav-btn active" id="nav-camera">Camera View</button>
        <button class="nav-btn" id="nav-builder">Script Builder</button>
    </nav>

    <!-- Camera Mode View -->
    <div id="view-camera" class="view-container active">
        <div id="video-container">
            <div class="video-wrapper" id="wrapper-left">
                <video id="video-left" class="video-feed" autoplay playsinline></video>
                <div class="canvas-container"><canvas id="canvas-left" class="effect-canvas"></canvas></div>
            </div>
            <div class="video-wrapper" id="wrapper-right">
                <video id="video-right" class="video-feed" autoplay playsinline></video>
                <div class="canvas-container"><canvas id="canvas-right" class="effect-canvas"></canvas></div>
            </div>
        </div>

        <video id="single-video" autoplay playsinline></video>
        <div class="canvas-container" id="single-canvas-wrapper">
            <canvas id="canvas-single" class="effect-canvas"></canvas>
        </div>

        <div id="controls-panel">
            <div class="controls-row">
                <button id="start-camera">Start Camera</button>
                <button id="stop-camera" disabled>Stop Camera</button>
                <button id="switch-camera">Switch Camera</button>
                <button id="toggle-vr">Enable VR View</button>
            </div>
            <div class="controls-row" id="vr-offset-controls" style="display: none;">
                <button id="offset-in">Move Apart</button>
                <button id="offset-out">Move Together</button>
                <button id="offset-reset">Reset Offset</button>
            </div>
            <div class="info-row">
                <span id="active-script-label">Active Script: Standard</span>
            </div>
        </div>
    </div>

    <!-- Builder Mode View -->
    <div id="view-builder" class="view-container">
        
        <div id="builder-layout">
            
            <div id="sidebar-overlay"></div>

            <!-- Palette Sidebar -->
            <div class="sidebar" id="palette-panel">
                <div class="panel-title">Add Nodes</div>
                <div id="blocks-palette" style="display: flex; flex-direction: column; gap: 5px;"></div>
                
                <hr style="border-color: rgba(255,255,255,0.1); margin: 10px 0;">
                
                <div class="panel-title">Global Variables</div>
                <div id="variables-container" style="display: flex; flex-direction: column; gap: 10px;">
                    <!-- V1 to V5 Sliders injected here -->
                </div>
            </div>

            <!-- Workspace Viewport -->
            <div id="workspace-viewport">
                <div id="workspace-inner">
                    <svg id="wires-svg"></svg>
                    <div id="nodes-container"></div>
                </div>
            </div>

            <!-- Builder Preview Window -->
            <div id="builder-preview">
                <canvas id="preview-canvas"></canvas>
            </div>

            <!-- Mobile UI Overlays -->
            <div id="mobile-bottom-bar">
                <button id="btn-toggle-palette">➕ Add Node</button>
                <button id="btn-toggle-scripts">💾 Scripts</button>
            </div>

            <!-- Save/Load Sidebar -->
            <div class="sidebar" id="scripts-panel">
                <div class="panel-title">Scripts</div>
                <button id="save-script-btn" style="width: 100%;">Save Graph</button>
                <button id="clear-script-btn" style="width: 100%; margin-top: 5px; background: rgba(239, 68, 68, 0.2);">Clear Workspace</button>
                <hr style="border-color: rgba(255,255,255,0.1); margin: 10px 0;">
                <div id="saved-scripts-list" style="display: flex; flex-direction: column; gap: 0;"></div>
                
                <div style="font-size: 11px; color: #888; text-align: center; margin-top: auto; padding-top: 20px;">
                    Scroll/pinch to zoom. Click an output, then click an input to connect.
                </div>
            </div>

        </div>
    </div>

    <!-- Save Modal -->
    <div class="modal-overlay" id="save-modal">
        <div class="modal">
            <h3 style="text-align: center;">Save Script</h3>
            <input type="text" id="save-script-name" placeholder="Enter script name..." autocomplete="off">
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button id="cancel-save">Cancel</button>
                <button id="confirm-save" style="background: rgba(255,255,255,0.4);">Save</button>
            </div>
        </div>
    </div>

    <script>
    // --- Global Variables Data ---
    const globals = { v1: 0.5, v2: 0.5, v3: 0.5, v4: 0.5, v5: 0.5 };

    // --- Config & Node Definitions ---
    const NODE_DEFS = {
        camera: { label: 'Camera In', inPorts: [], outPorts: ['video'], color: 'rgba(255, 255, 255, 0.1)', maxOne: true },
        screen: { label: 'Screen Out', inPorts: ['render'], outPorts: [], color: 'rgba(255, 255, 255, 0.1)', maxOne: true },
        
        // Adjustments & Transforms
        fps: { 
            label: 'Framerate Limit', inPorts: ['in'], outPorts: ['out'], 
            params: [{ id: 'fps', label: 'Max FPS', type: 'range', min: 1, max: 60, default: 30 }] 
        },
        grayscale: { 
            label: 'Grayscale', inPorts: ['in'], outPorts: ['out'], 
            params: [{ id: 'amount', label: 'Amount (%)', type: 'range', min: 0, max: 100, default: 100 }] 
        },
        invert: { 
            label: 'Invert', inPorts: ['in'], outPorts: ['out'], 
            params: [{ id: 'amount', label: 'Amount (%)', type: 'range', min: 0, max: 100, default: 100 }] 
        },
        tint: { 
            label: 'RGB Filter', inPorts: ['in'], outPorts: ['out'], 
            params: [
                { id: 'r', label: 'Red Channel', type: 'range', min: 0, max: 255, default: 255 },
                { id: 'g', label: 'Green Channel', type: 'range', min: 0, max: 255, default: 255 },
                { id: 'b', label: 'Blue Channel', type: 'range', min: 0, max: 255, default: 255 }
            ] 
        },
        adjust: { 
            label: 'Bright / Contrast', inPorts: ['in'], outPorts: ['out'], 
            params: [
                { id: 'bright', label: 'Brightness', type: 'range', min: -100, max: 100, default: 0 },
                { id: 'contrast', label: 'Contrast', type: 'range', min: -100, max: 100, default: 0 }
            ] 
        },
        transform: {
            label: 'Transform (Flip)', inPorts: ['in'], outPorts: ['out'],
            params: [
                { id: 'flipX', label: 'Flip X', type: 'select', options: ['false', 'true'], default: 'false' },
                { id: 'flipY', label: 'Flip Y', type: 'select', options: ['false', 'true'], default: 'false' }
            ]
        },
        
        // Filters & Keys
        bandpass: { 
            label: 'Band Pass', inPorts: ['in'], outPorts: ['out'], 
            params: [
                { id: 'channel', label: 'Target Channel', type: 'select', options: ['luma', 'red', 'green', 'blue'], default: 'luma' },
                { id: 'median', label: 'Target Val', type: 'range', min: 0, max: 255, default: 127 },
                { id: 'range', label: 'Pass Width', type: 'range', min: 0, max: 255, default: 50 }
            ] 
        },
        chroma: {
            label: 'Chroma Key', inPorts: ['in'], outPorts: ['out'],
            params: [
                { id: 'r', label: 'Key Red', type: 'range', min:0, max:255, default:0 },
                { id: 'g', label: 'Key Green', type: 'range', min:0, max:255, default:255 },
                { id: 'b', label: 'Key Blue', type: 'range', min:0, max:255, default:0 },
                { id: 'tol', label: 'Tolerance', type: 'range', min:1, max:200, default:80 }
            ]
        },
        edge: { 
            label: 'Edge Detect', inPorts: ['in'], outPorts: ['out'], 
            params: [
                { id: 'mode', label: 'Output Mode', type: 'select', options: ['grayscale', 'binary'], default: 'grayscale' },
                { id: 'intensity', label: 'Intensity / Thresh', type: 'range', min: 1, max: 255, default: 50 }
            ] 
        },
        mask: { 
            label: 'Luma Mask', inPorts: ['in'], outPorts: ['out'], 
            params: [{ id: 'invert', label: 'Invert Mask', type: 'select', options: ['false', 'true'], default: 'false' }] 
        },
        pixelate: {
            label: 'Pixelate', inPorts: ['in'], outPorts: ['out'],
            params: [{ id: 'size', label: 'Block Size', type: 'range', min:1, max:100, default:10 }]
        },

        // Temporal / Mixing
        delay: { 
            label: 'Delay', inPorts: ['in'], outPorts: ['out'], 
            params: [{ id: 'frames', label: 'Delay Frames', type: 'range', min: 1, max: 60, default: 15 }] 
        },
        accumulate: { 
            label: 'Long Exposure', inPorts: ['in'], outPorts: ['out'], 
            params: [
                { id: 'frames', label: 'Frame Loop', type: 'range', min: 2, max: 60, default: 15 },
                { id: 'mode', label: 'Blend Mode', type: 'select', options: ['average', 'lighten', 'darken'], default: 'average' }
            ] 
        },
        blend: { 
            label: 'Blend', inPorts: ['bg', 'fg'], outPorts: ['out'], 
            params: [
                { id: 'mode', label: 'Mode', type: 'select', options: ['mix', 'add', 'multiply', 'screen', 'difference'], default: 'mix' },
                { id: 'mix', label: 'Amount (%)', type: 'range', min: 0, max: 100, default: 50 }
            ] 
        }
    };

    // --- State ---
    let nodes = {}; 
    let wires = []; 
    
    let activeScriptName = "Standard";
    let savedScripts = [];

    // Interaction state
    let draggedNode = null;
    let dragOffsetX = 0, dragOffsetY = 0;
    
    let draggingWire = null; 
    let selectedWire = null; 
    
    // Connect state
    let pendingPort = null; // { nodeId, port, isOut }
    let dragStartPos = null;

    // Panning & Zoom state
    let isPanning = false;
    let panStartX = 0, panStartY = 0;
    let panStartScrollLeft = 0, panStartScrollTop = 0;
    let currentZoom = 1;
    
    let activePointers = new Map();
    let lastPinchDist = null;

    let evalOrder = [];
    let hasCycleError = false;

    // Camera/VR State
    let stream = null;
    let usingBackCamera = true;
    let vrMode = false;
    let vrOffset = 0;
    let renderLoopId = null;
    let hideControlsTimeout = null;
    let videoWidth = 640; 
    let videoHeight = 480;

    // --- DOM Elements ---
    const workspaceViewport = document.getElementById('workspace-viewport');
    const workspaceInner = document.getElementById('workspace-inner');
    const nodesContainer = document.getElementById('nodes-container');
    const wiresSvg = document.getElementById('wires-svg');
    const videoLeft = document.getElementById('video-left');
    const videoRight = document.getElementById('video-right');
    const singleVideo = document.getElementById('single-video');
    const canvasLeft = document.getElementById('canvas-left');
    const canvasRight = document.getElementById('canvas-right');
    const canvasSingle = document.getElementById('canvas-single');
    const previewCanvas = document.getElementById('preview-canvas');
    const camControlsPanel = document.getElementById('controls-panel');
    const viewCam = document.getElementById('view-camera');

    // Mobile specific DOM
    const palettePanel = document.getElementById('palette-panel');
    const scriptsPanel = document.getElementById('scripts-panel');
    const sidebarOverlay = document.getElementById('sidebar-overlay');
    const btnTogglePalette = document.getElementById('btn-toggle-palette');
    const btnToggleScripts = document.getElementById('btn-toggle-scripts');

    // --- Helpers ---
    function isMobile() { return window.innerWidth <= 768; }
    function closeAllPanels() {
        palettePanel.classList.remove('open');
        scriptsPanel.classList.remove('open');
        sidebarOverlay.classList.remove('active');
    }

    btnTogglePalette.onclick = () => { palettePanel.classList.add('open'); sidebarOverlay.classList.add('active'); };
    btnToggleScripts.onclick = () => { scriptsPanel.classList.add('open'); sidebarOverlay.classList.add('active'); };
    sidebarOverlay.onclick = closeAllPanels;

    function generateId() { return Math.random().toString(36).substr(2, 9); }

    // --- Global Variables Engine ---
    function initGlobalVarsUI() {
        const container = document.getElementById('variables-container');
        container.innerHTML = '';
        Object.keys(globals).forEach(v => {
            const el = document.createElement('div');
            el.className = 'var-group';
            el.innerHTML = `
                <label><span>${v.toUpperCase()}</span> <span id="val-${v}">${Math.round(globals[v]*100)}%</span></label>
                <input type="range" min="0" max="100" value="${globals[v]*100}" oninput="updateGlobalVar('${v}', this.value)">
            `;
            container.appendChild(el);
        });
    }

    window.updateGlobalVar = function(varName, percentVal) {
        const floatVal = percentVal / 100;
        globals[varName] = floatVal;
        document.getElementById(`val-${varName}`).textContent = `${percentVal}%`;
        
        Object.values(nodes).forEach(node => {
            if (node.bindings) {
                Object.entries(node.bindings).forEach(([paramId, boundVar]) => {
                    if (boundVar === varName) {
                        const def = NODE_DEFS[node.type].params.find(p => p.id === paramId);
                        if (def) {
                            const mappedVal = Math.round(def.min + floatVal * (def.max - def.min));
                            node.params[paramId] = mappedVal;
                            const lbl = document.getElementById(`lbl-${node.id}-${paramId}`);
                            if (lbl) lbl.textContent = mappedVal;
                            const slider = document.getElementById(`slider-${node.id}-${paramId}`);
                            if (slider) slider.value = mappedVal;
                        }
                    }
                });
            }
        });
    };

    window.updateBinding = function(nodeId, paramId, varName) {
        const node = nodes[nodeId];
        if (!node) return;
        if (!node.bindings) node.bindings = {};
        
        const slider = document.getElementById(`slider-${nodeId}-${paramId}`);
        const selectBox = document.getElementById(`bind-${nodeId}-${paramId}`);
        
        if (varName === "") {
            delete node.bindings[paramId];
            if(slider) slider.disabled = false;
            selectBox.classList.remove('active');
        } else {
            node.bindings[paramId] = varName;
            if(slider) slider.disabled = true;
            selectBox.classList.add('active');
            updateGlobalVar(varName, globals[varName] * 100);
        }
    };


    // --- Graph Engine ---
    function rebuildGraphOrder() {
        hasCycleError = false;
        let inDegree = {};
        let adjList = {};
        
        Object.keys(nodes).forEach(id => {
            inDegree[id] = 0;
            adjList[id] = [];
            nodes[id].domElement.classList.remove('error');
        });

        wires.forEach(w => {
            adjList[w.fromNode].push(w.toNode);
            inDegree[w.toNode] = (inDegree[w.toNode] || 0) + 1;
        });

        let queue = [];
        Object.keys(inDegree).forEach(id => {
            if (inDegree[id] === 0) queue.push(id);
        });

        evalOrder = [];
        let count = 0;
        
        while(queue.length > 0) {
            let curr = queue.shift();
            evalOrder.push(curr);
            count++;
            
            adjList[curr].forEach(neighbor => {
                inDegree[neighbor]--;
                if (inDegree[neighbor] === 0) queue.push(neighbor);
            });
        }

        if (count !== Object.keys(nodes).length) {
            hasCycleError = true;
            Object.keys(nodes).forEach(id => {
                if (!evalOrder.includes(id)) nodes[id].domElement.classList.add('error');
            });
        }
    }

    function createInternalCanvas(width, height) {
        const c = document.createElement('canvas');
        c.width = width; c.height = height;
        return c;
    }

    function evaluateFrame() {
        if (!stream || hasCycleError || evalOrder.length === 0) return;
        
        if (singleVideo.videoWidth) {
            videoWidth = singleVideo.videoWidth;
            videoHeight = singleVideo.videoHeight;
        }

        Object.values(nodes).forEach(node => {
            if (!node.canvas || node.canvas.width !== videoWidth) {
                node.canvas = createInternalCanvas(videoWidth, videoHeight);
                node.ctx = node.canvas.getContext('2d', { willReadFrequently: true });
                if (node.type === 'delay' || node.type === 'accumulate') node.buffer = []; 
                if (node.type === 'edge') node.grayBuffer = new Uint8Array(videoWidth * videoHeight);
            }
        });

        for (let nodeId of evalOrder) {
            const node = nodes[nodeId];
            const def = NODE_DEFS[node.type];
            
            if (node.type === 'camera') {
                node.ctx.drawImage(singleVideo, 0, 0, videoWidth, videoHeight);
            } 
            else if (node.type === 'screen') {
                const wire = wires.find(w => w.toNode === nodeId && w.toPort === 'render');
                if (wire) {
                    const inputCanvas = nodes[wire.fromNode].canvas;
                    renderFinalOutput(inputCanvas);
                } else {
                    renderFinalOutput(null); 
                }
            } 
            else {
                let inputs = {};
                def.inPorts.forEach(port => {
                    const wire = wires.find(w => w.toNode === nodeId && w.toPort === port);
                    inputs[port] = wire ? nodes[wire.fromNode].canvas : null;
                });
                applyNodeEffect(node, inputs);
            }
        }
    }

    function applyNodeEffect(node, inputs) {
        const { type, params, ctx, canvas } = node;
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0,0,w,h);

        // --- Temporal / Structural Effects ---
        if (type === 'fps') {
            const inCanvas = inputs['in'];
            if (!inCanvas) return;
            const limit = parseInt(params.fps || 30);
            const now = performance.now();
            if (!node.lastTime) node.lastTime = 0;
            if (now - node.lastTime >= (1000 / limit)) {
                node.lastTime = now;
                ctx.drawImage(inCanvas, 0, 0);
            }
            return;
        }

        if (type === 'delay') {
            const inCanvas = inputs['in'];
            if (!inCanvas) return;
            
            const reqFrames = parseInt(params.frames || 15);
            if (!node.buffer) node.buffer = [];
            
            const tempCtx = inCanvas.getContext('2d', {willReadFrequently:true});
            const frameData = tempCtx.getImageData(0,0,w,h);
            
            while (node.buffer.length < reqFrames) node.buffer.push(new Uint8ClampedArray(w*h*4));
            if (node.buffer.length > reqFrames) node.buffer.length = reqFrames;
            
            node.bufIndex = (node.bufIndex || 0) % reqFrames;
            node.buffer[node.bufIndex].set(frameData.data);
            
            let delayedIndex = (node.bufIndex + 1) % reqFrames;
            let outData = node.buffer[delayedIndex] || node.buffer[0];
            
            if(!node.outImg || node.outImg.width !== w) node.outImg = ctx.createImageData(w, h);
            node.outImg.data.set(outData);
            ctx.putImageData(node.outImg, 0, 0);
            
            node.bufIndex++;
            return;
        }

        if (type === 'accumulate') {
            const inCanvas = inputs['in'];
            if (!inCanvas) return;
            
            const reqFrames = parseInt(params.frames || 15);
            const mode = params.mode || 'average';
            
            if (!node.buffer) node.buffer = [];
            const tempCtx = inCanvas.getContext('2d', {willReadFrequently:true});
            const frameData = tempCtx.getImageData(0,0,w,h);
            
            while (node.buffer.length < reqFrames) node.buffer.push(new Uint8ClampedArray(w*h*4));
            if (node.buffer.length > reqFrames) node.buffer.length = reqFrames;
            
            node.bufIndex = (node.bufIndex || 0) % reqFrames;
            node.buffer[node.bufIndex].set(frameData.data);
            
            if(!node.outImg || node.outImg.width !== w) node.outImg = ctx.createImageData(w, h);
            const outImg = node.outImg;
            const out = outImg.data;
            const numPixels = w * h * 4;
            
            if(node.frameCount === undefined) node.frameCount = 0;
            if(node.frameCount < reqFrames) node.frameCount++;
            const activeFrames = Math.min(node.frameCount, reqFrames);
            const invActive = 1 / activeFrames;

            if (mode === 'average') {
                for (let i = 0; i < numPixels; i += 4) {
                    let r=0, g=0, b=0;
                    for(let f=0; f<activeFrames; f++) {
                        r += node.buffer[f][i];
                        g += node.buffer[f][i+1];
                        b += node.buffer[f][i+2];
                    }
                    out[i] = r * invActive; out[i+1] = g * invActive; out[i+2] = b * invActive; out[i+3] = 255;
                }
            } else if (mode === 'lighten') {
                for (let i = 0; i < numPixels; i += 4) {
                    let r=0, g=0, b=0;
                    for(let f=0; f<activeFrames; f++) {
                        if(node.buffer[f][i] > r) r = node.buffer[f][i];
                        if(node.buffer[f][i+1] > g) g = node.buffer[f][i+1];
                        if(node.buffer[f][i+2] > b) b = node.buffer[f][i+2];
                    }
                    out[i]=r; out[i+1]=g; out[i+2]=b; out[i+3]=255;
                }
            } else if (mode === 'darken') {
                for (let i = 0; i < numPixels; i += 4) {
                    let r=255, g=255, b=255;
                    for(let f=0; f<activeFrames; f++) {
                        if(node.buffer[f][i] < r) r = node.buffer[f][i];
                        if(node.buffer[f][i+1] < g) g = node.buffer[f][i+1];
                        if(node.buffer[f][i+2] < b) b = node.buffer[f][i+2];
                    }
                    out[i]=r; out[i+1]=g; out[i+2]=b; out[i+3]=255;
                }
            }
            
            ctx.putImageData(outImg, 0, 0);
            node.bufIndex++;
            return;
        }

        if (type === 'blend') {
            const bgC = inputs['bg'];
            const fgC = inputs['fg'];
            
            if (!bgC && !fgC) return;
            if (!bgC || !fgC) { ctx.drawImage(bgC || fgC, 0, 0); return; }

            const bgCtx = bgC.getContext('2d', {willReadFrequently: true});
            const fgCtx = fgC.getContext('2d', {willReadFrequently: true});
            const bgData = bgCtx.getImageData(0,0,w,h).data;
            const fgData = fgCtx.getImageData(0,0,w,h).data;
            
            if(!node.outImg || node.outImg.width !== w) node.outImg = ctx.createImageData(w, h);
            const outImg = node.outImg;
            const out = outImg.data;
            
            const mode = params.mode || 'mix';
            const mixAmt = parseFloat(params.mix || 50) / 100;
            const len = bgData.length;

            for (let i = 0; i < len; i += 4) {
                let r1=bgData[i], g1=bgData[i+1], b1=bgData[i+2];
                let r2=fgData[i], g2=fgData[i+1], b2=fgData[i+2];
                
                let r, g, b;
                if (mode === 'add') {
                    r = Math.min(255, r1 + r2); g = Math.min(255, g1 + g2); b = Math.min(255, b1 + b2);
                } else if (mode === 'multiply') {
                    r = (r1 * r2) / 255; g = (g1 * g2) / 255; b = (b1 * b2) / 255;
                } else if (mode === 'screen') {
                    r = 255 - ((255-r1)*(255-r2))/255; 
                    g = 255 - ((255-g1)*(255-g2))/255; 
                    b = 255 - ((255-b1)*(255-b2))/255;
                } else if (mode === 'difference') {
                    r = Math.abs(r1 - r2); g = Math.abs(g1 - g2); b = Math.abs(b1 - b2);
                } else { // mix
                    r = r2; g = g2; b = b2; 
                }

                out[i]   = r1 + (r - r1)*mixAmt;
                out[i+1] = g1 + (g - g1)*mixAmt;
                out[i+2] = b1 + (b - b1)*mixAmt;
                out[i+3] = 255;
            }
            ctx.putImageData(outImg, 0, 0);
            return;
        }

        if (type === 'transform') {
            const inCanvas = inputs['in'];
            if (!inCanvas) return;
            const flipX = params.flipX === 'true';
            const flipY = params.flipY === 'true';
            
            ctx.save();
            ctx.translate(flipX ? w : 0, flipY ? h : 0);
            ctx.scale(flipX ? -1 : 1, flipY ? -1 : 1);
            ctx.drawImage(inCanvas, 0, 0);
            ctx.restore();
            return;
        }

        if (type === 'pixelate') {
            const inCanvas = inputs['in'];
            if (!inCanvas) return;
            const size = parseInt(params.size || 10);
            
            if (size <= 1) { ctx.drawImage(inCanvas, 0, 0); return; }
            
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(inCanvas, 0, 0, w/size, h/size);
            ctx.drawImage(canvas, 0, 0, w/size, h/size, 0, 0, w, h);
            return;
        }

        // --- Single-Input Pixel Processors ---
        const inCanvas = inputs['in'];
        if (!inCanvas) return;
        
        const inCtx = inCanvas.getContext('2d', {willReadFrequently: true});
        const imgData = inCtx.getImageData(0,0,w,h);
        const data = imgData.data; 
        const len = data.length;

        if (type === 'grayscale') {
            const amt = parseFloat(params.amount||100)/100;
            for (let i=0; i<len; i+=4) {
                let r=data[i], g=data[i+1], b=data[i+2];
                let gray = 0.299*r + 0.587*g + 0.114*b;
                data[i] = r + (gray-r)*amt; data[i+1] = g + (gray-g)*amt; data[i+2] = b + (gray-b)*amt;
            }
        } 
        else if (type === 'invert') {
            const amt = parseFloat(params.amount||100)/100;
            for (let i=0; i<len; i+=4) {
                data[i] += (255 - 2*data[i])*amt;
                data[i+1] += (255 - 2*data[i+1])*amt;
                data[i+2] += (255 - 2*data[i+2])*amt;
            }
        } 
        else if (type === 'tint') {
            const rF = parseFloat(params.r!==undefined?params.r:255)/255;
            const gF = parseFloat(params.g!==undefined?params.g:255)/255;
            const bF = parseFloat(params.b!==undefined?params.b:255)/255;
            for (let i=0; i<len; i+=4) {
                data[i]=data[i]*rF; data[i+1]=data[i+1]*gF; data[i+2]=data[i+2]*bF;
            }
        } 
        else if (type === 'adjust') {
            const bright = parseFloat(params.bright||0);
            const contrast = parseFloat(params.contrast||0);
            const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
            for (let i=0; i<len; i+=4) {
                data[i] = factor * (data[i] - 128) + 128 + bright;
                data[i+1] = factor * (data[i+1] - 128) + 128 + bright;
                data[i+2] = factor * (data[i+2] - 128) + 128 + bright;
            }
        }
        else if (type === 'bandpass') {
            const med = parseInt(params.median||127), rh = parseInt(params.range||50)/2;
            const targetChannel = params.channel || 'luma';
            
            for (let i=0; i<len; i+=4) {
                let val;
                if (targetChannel === 'red') val = data[i];
                else if (targetChannel === 'green') val = data[i+1];
                else if (targetChannel === 'blue') val = data[i+2];
                else val = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2]; 

                if (Math.abs(val - med) > rh) { 
                    data[i] = 0; data[i+1] = 0; data[i+2] = 0; 
                }
            }
        } 
        else if (type === 'chroma') {
            const kr = params.r || 0, kg = params.g || 255, kb = params.b || 0;
            const tol = params.tol || 80;
            for (let i=0; i<len; i+=4) {
                let dist = Math.sqrt(Math.pow(data[i]-kr,2) + Math.pow(data[i+1]-kg,2) + Math.pow(data[i+2]-kb,2));
                if (dist < tol) {
                    data[i+3] = 0; 
                }
            }
        }
        else if (type === 'mask') {
            const inv = params.invert === 'true';
            for (let i=0; i<len; i+=4) {
                let gray = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
                data[i+3] = inv ? (255 - gray) : gray; 
            }
        }
        else if (type === 'edge') {
            const intensity = parseInt(params.intensity || 50);
            const mode = params.mode || 'grayscale';
            if(!node.grayBuffer || node.grayBuffer.length !== w * h) node.grayBuffer = new Uint8Array(w * h);
            const gray = node.grayBuffer;
            
            for(let i=0, j=0; i<len; i+=4, j++) {
                gray[j] = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
            }
            
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = y * w + x;
                    const c = gray[idx];
                    let right = x < w - 1 ? gray[idx + 1] : c;
                    let bottom = y < h - 1 ? gray[idx + w] : c;
                    
                    const diff = Math.abs(c - right) + Math.abs(c - bottom);
                    const outIdx = idx * 4;
                    
                    let val;
                    if (mode === 'binary') {
                        val = diff > intensity ? 255 : 0;
                    } else {
                        val = Math.min(255, diff * (intensity / 10)); 
                    }
                    
                    data[outIdx] = val;
                    data[outIdx+1] = val;
                    data[outIdx+2] = val;
                    data[outIdx+3] = 255;
                }
            }
        }

        ctx.putImageData(imgData, 0, 0);
    }

    function renderFinalOutput(sourceCanvas) {
        const targets = vrMode ? [canvasLeft, canvasRight] : [canvasSingle];
        
        if (!sourceCanvas) {
            canvasLeft.style.display = 'none';
            canvasRight.style.display = 'none';
            canvasSingle.style.display = 'none';
            previewCanvas.style.display = 'none';
            return;
        }

        targets.forEach(c => {
            c.style.display = 'block';
            if (c.width !== sourceCanvas.width) c.width = sourceCanvas.width;
            if (c.height !== sourceCanvas.height) c.height = sourceCanvas.height;
            const ctx = c.getContext('2d');
            ctx.drawImage(sourceCanvas, 0, 0);
        });

        if (vrMode) canvasSingle.style.display = 'none';
        else { canvasLeft.style.display = 'none'; canvasRight.style.display = 'none'; }

        previewCanvas.style.display = 'block';
        if (previewCanvas.width !== sourceCanvas.width) previewCanvas.width = sourceCanvas.width;
        if (previewCanvas.height !== sourceCanvas.height) previewCanvas.height = sourceCanvas.height;
        previewCanvas.getContext('2d').drawImage(sourceCanvas, 0, 0);
    }

    function renderLoop() {
        evaluateFrame();
        renderLoopId = requestAnimationFrame(renderLoop);
    }

    // --- UI: Node Workspace Rendering & Interaction ---

    function setPendingPort(nodeId, port, isOut, element) {
        clearPendingPort();
        pendingPort = { nodeId, port, isOut };
        if (element) element.classList.add('pending');
    }

    function clearPendingPort() {
        if (pendingPort) {
            document.querySelectorAll('.port.pending').forEach(el => el.classList.remove('pending'));
            pendingPort = null;
        }
    }

    function createNode(type, x, y, restoredId = null, restoredParams = null, restoredBindings = null) {
        const def = NODE_DEFS[type];
        if (def.maxOne) {
            const existing = Object.values(nodes).find(n => n.type === type);
            if (existing) return existing.id;
        }

        const id = restoredId || generateId();
        const el = document.createElement('div');
        el.className = 'node';
        el.id = `node-${id}`;
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;

        let bodyHtml = '';
        const params = restoredParams || {};
        const bindings = restoredBindings || {};

        if (def.inPorts.length > 0 || def.outPorts.length > 0) {
            const maxPorts = Math.max(def.inPorts.length, def.outPorts.length);
            for(let i=0; i<maxPorts; i++) {
                const inP = def.inPorts[i];
                const outP = def.outPorts[i];
                bodyHtml += `<div class="port-row">
                    <div class="port-label">${inP ? inP : ''}</div>
                    ${inP ? `<div class="port port-in" data-node="${id}" data-port="${inP}"></div>` : ''}
                    <div class="port-label">${outP ? outP : ''}</div>
                    ${outP ? `<div class="port port-out" data-node="${id}" data-port="${outP}"></div>` : ''}
                </div>`;
            }
        }

        if (def.params) {
            def.params.forEach(p => {
                const val = params[p.id] !== undefined ? params[p.id] : p.default;
                params[p.id] = val; 
                const boundVar = bindings[p.id] || "";
                
                if (p.type === 'range') {
                    const bindSelect = `
                        <select id="bind-${id}-${p.id}" class="var-bind-select ${boundVar ? 'active' : ''}" onchange="updateBinding('${id}','${p.id}',this.value)">
                            <option value="">🔗</option>
                            <option value="v1" ${boundVar==='v1'?'selected':''}>v1</option>
                            <option value="v2" ${boundVar==='v2'?'selected':''}>v2</option>
                            <option value="v3" ${boundVar==='v3'?'selected':''}>v3</option>
                            <option value="v4" ${boundVar==='v4'?'selected':''}>v4</option>
                            <option value="v5" ${boundVar==='v5'?'selected':''}>v5</option>
                        </select>
                    `;
                    
                    bodyHtml += `<div class="param-group">
                        <div class="param-header">
                            <span>${p.label}</span>
                            <div>${bindSelect}<span id="lbl-${id}-${p.id}">${val}</span></div>
                        </div>
                        <input type="range" id="slider-${id}-${p.id}" min="${p.min}" max="${p.max}" value="${val}" 
                            ${boundVar ? 'disabled' : ''} oninput="updateParam('${id}','${p.id}',this.value)">
                    </div>`;
                } else if (p.type === 'select') {
                    let opts = p.options.map(o => `<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('');
                    bodyHtml += `<div class="param-group">
                        <span>${p.label}</span>
                        <select class="node-select" onchange="updateParam('${id}','${p.id}',this.value)">${opts}</select>
                    </div>`;
                }
            });
        }

        const canDelete = !def.maxOne;

        el.innerHTML = `
            <div class="node-header">
                ${def.label}
                <div class="node-actions">
                    ${canDelete ? `<button class="node-btn" onclick="duplicateNode('${id}')" title="Duplicate Node">⧉</button>` : ''}
                    ${canDelete ? `<button class="node-btn delete" onclick="deleteNode('${id}')" title="Delete Node">✕</button>` : ''}
                </div>
            </div>
            <div class="node-body">${bodyHtml}</div>
        `;

        nodesContainer.appendChild(el);
        nodes[id] = { id, type, params, bindings, domElement: el };
        
        const header = el.querySelector('.node-header');
        header.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            draggedNode = id;
            const rect = el.getBoundingClientRect();
            // scaled offset
            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;
            el.style.zIndex = 5; 
        });

        // Port Click-To-Connect & Drag Interactions
        el.querySelectorAll('.port').forEach(portEl => {
            portEl.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                const isOut = portEl.classList.contains('port-out');
                const portName = portEl.dataset.port;

                // 1. Check if we have a pending connection we can fulfill
                if (pendingPort && pendingPort.isOut !== isOut && pendingPort.nodeId !== id) {
                    const fromNode = pendingPort.isOut ? pendingPort.nodeId : id;
                    const fromPort = pendingPort.isOut ? pendingPort.port : portName;
                    const toNode = pendingPort.isOut ? id : pendingPort.nodeId;
                    const toPort = pendingPort.isOut ? portName : pendingPort.port;
                    
                    wires = wires.filter(w => !(w.toNode === toNode && w.toPort === toPort)); // Clear old target wire
                    wires.push({ id: generateId(), fromNode, fromPort, toNode, toPort });
                    
                    clearPendingPort();
                    rebuildGraphOrder();
                    drawWires();
                    return; // Connection successful
                }

                // 2. Start a drag / register a new pending port
                let startDragNode = id;
                let startDragPort = portName;
                
                if (!isOut) {
                    const existingWireIdx = wires.findIndex(w => w.toNode === id && w.toPort === portName);
                    if (existingWireIdx >= 0) {
                        const w = wires[existingWireIdx];
                        wires.splice(existingWireIdx, 1);
                        startDragNode = w.fromNode;
                        startDragPort = w.fromPort;
                        rebuildGraphOrder();
                        drawWires();
                        // Make the disconnected OUT port the new pending port
                        const outNodeEl = nodes[startDragNode].domElement;
                        const outPortEl = outNodeEl.querySelector(`.port-out[data-port="${startDragPort}"]`);
                        setPendingPort(startDragNode, startDragPort, true, outPortEl);
                    } else {
                        setPendingPort(id, portName, false, portEl);
                    }
                } else {
                    setPendingPort(id, portName, true, portEl);
                }

                dragStartPos = { x: e.clientX, y: e.clientY };
                startWireDrag(startDragNode, startDragPort, e.clientX, e.clientY);
            });
        });

        rebuildGraphOrder();
        drawWires();
        return id;
    }

    window.updateParam = function(nodeId, paramId, val) {
        if (nodes[nodeId]) {
            nodes[nodeId].params[paramId] = val;
            const lbl = document.getElementById(`lbl-${nodeId}-${paramId}`);
            if (lbl) lbl.textContent = val;
        }
    };

    window.deleteNode = function(id) {
        if (!nodes[id]) return;
        nodes[id].domElement.remove();
        delete nodes[id];
        wires = wires.filter(w => w.fromNode !== id && w.toNode !== id);
        rebuildGraphOrder();
        drawWires();
    };

    window.duplicateNode = function(id) {
        const node = nodes[id];
        if (!node) return;
        const newX = parseInt(node.domElement.style.left) + 20;
        const newY = parseInt(node.domElement.style.top) + 20;
        
        const clonedParams = JSON.parse(JSON.stringify(node.params));
        const clonedBindings = JSON.parse(JSON.stringify(node.bindings || {}));
        
        createNode(node.type, newX, newY, null, clonedParams, clonedBindings);
    };

    // --- Zoom Engine ---
    function applyZoom(factor, cx, cy) {
        const oldZoom = currentZoom;
        let newZoom = currentZoom * factor;
        newZoom = Math.max(0.3, Math.min(newZoom, 3)); // Clamp zoom between 0.3x and 3x
        
        if (newZoom === oldZoom) return;

        const rect = workspaceViewport.getBoundingClientRect();
        const relX = cx - rect.left;
        const relY = cy - rect.top;

        // Calculate absolute position on the inner canvas
        const wsX = (workspaceViewport.scrollLeft + relX) / oldZoom;
        const wsY = (workspaceViewport.scrollTop + relY) / oldZoom;

        currentZoom = newZoom;
        workspaceInner.style.transform = `scale(${currentZoom})`;

        // Adjust scroll position to keep the target under the cursor
        workspaceViewport.scrollLeft = wsX * currentZoom - relX;
        workspaceViewport.scrollTop = wsY * currentZoom - relY;
        
        drawWires();
    }

    workspaceViewport.addEventListener('wheel', (e) => {
        e.preventDefault();
        const factor = e.deltaY > 0 ? 0.9 : 1.1;
        applyZoom(factor, e.clientX, e.clientY);
    }, { passive: false });


    // --- Wire Drawing Logic ---
    function getPortPos(nodeId, portName, isOut) {
        const node = nodes[nodeId];
        if (!node) return {x:0, y:0};
        const el = node.domElement;
        const portEl = el.querySelector(`.port-${isOut?'out':'in'}[data-port="${portName}"]`);
        if (!portEl) return {x:parseInt(el.style.left), y:parseInt(el.style.top)};
        
        const portRect = portEl.getBoundingClientRect();
        const wsRect = workspaceInner.getBoundingClientRect();
        // Return UN-SCALED coordinates for the SVG path
        return {
            x: (portRect.left - wsRect.left) / currentZoom + (portRect.width / currentZoom) / 2,
            y: (portRect.top - wsRect.top) / currentZoom + (portRect.height / currentZoom) / 2
        };
    }

    function drawWires() {
        wiresSvg.innerHTML = '';
        wires.forEach(w => {
            const p1 = getPortPos(w.fromNode, w.fromPort, true);
            const p2 = getPortPos(w.toNode, w.toPort, false);
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('class', 'wire');
            path.setAttribute('d', `M ${p1.x} ${p1.y} C ${p1.x+50} ${p1.y}, ${p2.x-50} ${p2.y}, ${p2.x} ${p2.y}`);
            path.dataset.wireId = w.id;
            
            if (selectedWire === w.id) path.style.stroke = '#ef4444'; 
            
            path.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                selectedWire = w.id;
                drawWires();
            });

            path.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                wires = wires.filter(wire => wire.id !== w.id);
                selectedWire = null;
                rebuildGraphOrder();
                drawWires();
            });
            wiresSvg.appendChild(path);

            if (selectedWire === w.id) {
                const midX = (p1.x + p2.x) / 2;
                const midY = (p1.y + p2.y) / 2;

                const delBg = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                delBg.setAttribute('cx', midX); delBg.setAttribute('cy', midY);
                delBg.setAttribute('r', 14 / currentZoom); delBg.setAttribute('fill', '#ef4444');
                delBg.style.cursor = 'pointer'; delBg.style.pointerEvents = 'all';

                const delText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                delText.setAttribute('x', midX); delText.setAttribute('y', midY + (4 / currentZoom));
                delText.setAttribute('text-anchor', 'middle'); delText.setAttribute('fill', 'white');
                delText.setAttribute('font-size', `${14/currentZoom}px`); delText.setAttribute('font-weight', 'bold');
                delText.style.cursor = 'pointer'; delText.style.pointerEvents = 'none';
                delText.textContent = '✕';

                delBg.addEventListener('pointerdown', (e) => {
                    e.stopPropagation();
                    wires = wires.filter(wire => wire.id !== w.id);
                    selectedWire = null;
                    rebuildGraphOrder();
                    drawWires();
                });

                wiresSvg.appendChild(delBg);
                wiresSvg.appendChild(delText);
            }
        });

        if (draggingWire) {
            const p1 = getPortPos(draggingWire.fromNode, draggingWire.fromPort, true);
            const wsRect = workspaceInner.getBoundingClientRect();
            const p2 = { 
                x: (draggingWire.mouseX - wsRect.left) / currentZoom, 
                y: (draggingWire.mouseY - wsRect.top) / currentZoom 
            };
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('class', 'wire active');
            path.setAttribute('d', `M ${p1.x} ${p1.y} C ${p1.x+50} ${p1.y}, ${p2.x-50} ${p2.y}, ${p2.x} ${p2.y}`);
            wiresSvg.appendChild(path);
        }
    }

    function startWireDrag(nodeId, port, mx, my) {
        draggingWire = { fromNode: nodeId, fromPort: port, mouseX: mx, mouseY: my };
        drawWires();
    }
    function cleanupWireDrag() {
        draggingWire = null;
        drawWires();
    }

    // --- Universal Pointer Event Handling (Panning, Zooming, Dragging, Drops) ---
    
    workspaceViewport.addEventListener('pointerdown', (e) => {
        if (e.target === workspaceViewport || e.target === workspaceInner || e.target === wiresSvg) {
            if (selectedWire) {
                selectedWire = null;
                drawWires();
            }
            activePointers.set(e.pointerId, e);
            isPanning = true;
            workspaceViewport.classList.add('panning');
            workspaceViewport.setPointerCapture(e.pointerId);
            panStartX = e.clientX;
            panStartY = e.clientY;
            panStartScrollLeft = workspaceViewport.scrollLeft;
            panStartScrollTop = workspaceViewport.scrollTop;
        }
    });

    window.addEventListener('pointermove', (e) => {
        if(activePointers.has(e.pointerId)) {
            activePointers.set(e.pointerId, e);
        }

        // Pinch to zoom logic
        if (activePointers.size === 2) {
            const pts = Array.from(activePointers.values());
            const dx = pts[0].clientX - pts[1].clientX;
            const dy = pts[0].clientY - pts[1].clientY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (lastPinchDist) {
                const factor = dist / lastPinchDist;
                const mx = (pts[0].clientX + pts[1].clientX) / 2;
                const my = (pts[0].clientY + pts[1].clientY) / 2;
                applyZoom(factor, mx, my);
            }
            lastPinchDist = dist;
            isPanning = false; 
        } 
        else if (isPanning && activePointers.size === 1) {
            workspaceViewport.scrollLeft = panStartScrollLeft - (e.clientX - panStartX);
            workspaceViewport.scrollTop = panStartScrollTop - (e.clientY - panStartY);
        }
        
        if (draggedNode && nodes[draggedNode]) {
            const el = nodes[draggedNode].domElement;
            const wsRect = workspaceInner.getBoundingClientRect();
            
            // Map screen coordinate movement back to unscaled canvas coordinates
            let nx = (e.clientX - dragOffsetX - wsRect.left) / currentZoom;
            let ny = (e.clientY - dragOffsetY - wsRect.top) / currentZoom;
            el.style.left = `${Math.max(0, nx)}px`;
            el.style.top = `${Math.max(0, ny)}px`;
            drawWires();
        }
        
        if (draggingWire) {
            draggingWire.mouseX = e.clientX;
            draggingWire.mouseY = e.clientY;
            drawWires();
        }
    });

    window.addEventListener('pointerup', (e) => {
        activePointers.delete(e.pointerId);
        if (activePointers.size < 2) lastPinchDist = null;

        if (draggingWire) {
            const activeWire = wiresSvg.querySelector('.wire.active');
            if(activeWire) activeWire.style.display = 'none';
            
            const target = document.elementFromPoint(e.clientX, e.clientY);
            
            if(activeWire) activeWire.style.display = '';

            let connected = false;
            if (target && target.classList.contains('port-in')) {
                const targetNodeId = target.dataset.node;
                const targetPortName = target.dataset.port;
                
                if (draggingWire.fromNode !== targetNodeId) {
                    wires = wires.filter(w => !(w.toNode === targetNodeId && w.toPort === targetPortName));
                    wires.push({
                        id: generateId(),
                        fromNode: draggingWire.fromNode,
                        fromPort: draggingWire.fromPort,
                        toNode: targetNodeId,
                        toPort: targetPortName
                    });
                    rebuildGraphOrder();
                    clearPendingPort();
                    connected = true;
                }
            }

            if (!connected) {
                // If user dragged empty space far away, cancel pending click-to-connect state
                if (dragStartPos) {
                    const dx = e.clientX - dragStartPos.x;
                    const dy = e.clientY - dragStartPos.y;
                    if (Math.sqrt(dx*dx + dy*dy) > 15) {
                        clearPendingPort();
                    }
                } else {
                    clearPendingPort();
                }
            }
            cleanupWireDrag();
            drawWires();
        }

        if (draggedNode && nodes[draggedNode]) {
            nodes[draggedNode].domElement.style.zIndex = 2; 
            draggedNode = null;
        }
        
        if (isPanning) {
            isPanning = false;
            workspaceViewport.classList.remove('panning');
            workspaceViewport.releasePointerCapture(e.pointerId);
        }
    });


    // --- Init & Save/Load ---

    function initBuilder() {
        const pal = document.getElementById('blocks-palette');
        Object.keys(NODE_DEFS).forEach(k => {
            if (NODE_DEFS[k].maxOne) return; 
            const b = document.createElement('div');
            b.className = 'palette-block';
            b.innerHTML = `<span>${NODE_DEFS[k].label}</span><span>+</span>`;
            b.onclick = () => {
                const sl = workspaceViewport.scrollLeft;
                const st = workspaceViewport.scrollTop;
                const spawnX = isMobile() ? sl + 50 : sl + 280;
                createNode(k, (spawnX)/currentZoom, (st + 150)/currentZoom);
                if (isMobile()) closeAllPanels();
            };
            pal.appendChild(b);
        });

        initGlobalVarsUI();
        loadStorage();
        if (Object.keys(nodes).length === 0) setupDefaultGraph();
    }

    function setupDefaultGraph() {
        document.getElementById('nodes-container').innerHTML = '';
        nodes = {}; wires = [];
        
        let cx = 2000;
        let cy = 2000;
        
        // Find the absolute center based on the current scroll & view
        if (workspaceViewport.clientWidth > 0) {
            cx = (workspaceViewport.scrollLeft + workspaceViewport.clientWidth / 2) / currentZoom;
            cy = (workspaceViewport.scrollTop + workspaceViewport.clientHeight / 2) / currentZoom;
        }

        const cId = createNode('camera', cx - 250, cy - 100);
        const sId = createNode('screen', cx + 50, cy - 100);
        wires.push({ id: generateId(), fromNode: cId, fromPort: 'video', toNode: sId, toPort: 'render' });
        rebuildGraphOrder();
        drawWires();
        activeScriptName = "Standard (Default)";
        updateLabels();

        // Safety catch to scroll to middle on first load if dimensions weren't ready
        if (workspaceViewport.clientWidth === 0) {
            setTimeout(() => {
                workspaceViewport.scrollLeft = (2000 * currentZoom) - workspaceViewport.clientWidth / 2;
                workspaceViewport.scrollTop = (2000 * currentZoom) - workspaceViewport.clientHeight / 2;
            }, 100);
        }
    }

    function saveGraphToJSON() {
        return {
            globals: { ...globals },
            nodes: Object.values(nodes).map(n => ({
                id: n.id, type: n.type, params: n.params, bindings: n.bindings,
                x: parseInt(n.domElement.style.left), y: parseInt(n.domElement.style.top)
            })),
            wires: wires
        };
    }

    function loadGraphFromJSON(data, name) {
        document.getElementById('nodes-container').innerHTML = '';
        nodes = {}; wires = [];
        
        if (data.globals) {
            Object.keys(data.globals).forEach(v => {
                globals[v] = data.globals[v];
                const input = document.querySelector(`.var-group input[oninput*="'${v}'"]`);
                if(input) {
                    input.value = globals[v] * 100;
                    document.getElementById(`val-${v}`).textContent = `${Math.round(globals[v]*100)}%`;
                }
            });
        }
        
        data.nodes.forEach(n => createNode(n.type, n.x, n.y, n.id, n.params, n.bindings));
        wires = data.wires;
        activeScriptName = name;
        rebuildGraphOrder();
        drawWires();
        updateLabels();
        
        // Re-center around camera node
        const camNode = Object.values(nodes).find(n => n.type === 'camera');
        if(camNode) {
            workspaceViewport.scrollLeft = (parseInt(camNode.domElement.style.left) * currentZoom) - (isMobile()? 50 : 100);
            workspaceViewport.scrollTop = (parseInt(camNode.domElement.style.top) * currentZoom) - 100;
        }
        if (isMobile()) closeAllPanels();
    }

    function loadStorage() {
        try {
            const raw = localStorage.getItem('vrcam_node_scripts');
            if (raw) savedScripts = JSON.parse(raw);
        } catch(e) {}
        renderScriptList();
    }

    function saveStorage() {
        localStorage.setItem('vrcam_node_scripts', JSON.stringify(savedScripts));
        renderScriptList();
    }

    function renderScriptList() {
        const list = document.getElementById('saved-scripts-list');
        list.innerHTML = '';
        savedScripts.forEach((s, idx) => {
            const item = document.createElement('div');
            item.className = 'script-item';
            item.innerHTML = `<span>${s.name}</span><button class="node-btn delete" onclick="deleteScript(${idx}, event)">✕</button>`;
            item.onclick = () => loadGraphFromJSON(s.graph, s.name);
            list.appendChild(item);
        });
    }

    window.deleteScript = function(idx, e) {
        e.stopPropagation();
        savedScripts.splice(idx, 1);
        saveStorage();
    };

    document.getElementById('clear-script-btn').onclick = () => {
        if(confirm("Clear everything?")) { setupDefaultGraph(); activeScriptName = "New Graph"; updateLabels(); if(isMobile()) closeAllPanels();}
    };

    const modal = document.getElementById('save-modal');
    document.getElementById('save-script-btn').onclick = () => {
        modal.classList.add('active');
        document.getElementById('save-script-name').value = activeScriptName.replace(' (Default)', '');
    };
    document.getElementById('cancel-save').onclick = () => modal.classList.remove('active');
    document.getElementById('confirm-save').onclick = () => {
        const name = document.getElementById('save-script-name').value || 'My Graph';
        const graph = saveGraphToJSON();
        
        const exIdx = savedScripts.findIndex(s => s.name === name);
        if (exIdx >= 0) savedScripts[exIdx].graph = graph;
        else savedScripts.push({ name, graph });
        
        activeScriptName = name;
        saveStorage();
        updateLabels();
        modal.classList.remove('active');
        if (isMobile()) closeAllPanels();
    };

    function updateLabels() {
        document.getElementById('active-script-label').textContent = `Active Script: ${activeScriptName}`;
    }

    // --- Camera Control Logic ---
    async function startCamera() {
        try {
            if (stream) stream.getTracks().forEach(t => t.stop());
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: usingBackCamera ? 'environment' : 'user', width: { ideal: 1280 } }, audio: false
            });
            videoLeft.srcObject = stream; videoRight.srcObject = stream; singleVideo.srcObject = stream;
            
            document.getElementById('start-camera').disabled = true;
            document.getElementById('stop-camera').disabled = false;
            if (!renderLoopId) renderLoop();
            triggerControlsFade();
        } catch (e) { alert("Camera error: " + e.message); }
    }

    function stopCamera() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        stream = null;
        videoLeft.srcObject = null; videoRight.srcObject = null; singleVideo.srcObject = null;
        document.getElementById('start-camera').disabled = false;
        document.getElementById('stop-camera').disabled = true;
        if (renderLoopId) { cancelAnimationFrame(renderLoopId); renderLoopId = null; }
        renderFinalOutput(null);
    }

    document.getElementById('start-camera').onclick = startCamera;
    document.getElementById('stop-camera').onclick = stopCamera;
    document.getElementById('switch-camera').onclick = () => { usingBackCamera = !usingBackCamera; if (stream) startCamera(); };

    // --- VR Mode Logic ---
    function updateVRMode() {
        if (vrMode) {
            document.getElementById('video-container').style.display = 'flex';
            singleVideo.style.display = 'none';
            document.getElementById('single-canvas-wrapper').style.display = 'none';
            document.getElementById('vr-offset-controls').style.display = 'flex';
            document.getElementById('toggle-vr').textContent = 'Disable VR View';
        } else {
            document.getElementById('video-container').style.display = 'none';
            singleVideo.style.display = 'block';
            document.getElementById('single-canvas-wrapper').style.display = 'block';
            document.getElementById('vr-offset-controls').style.display = 'none';
            document.getElementById('toggle-vr').textContent = 'Enable VR View';
        }
        updateOffset();
    }

    document.getElementById('toggle-vr').onclick = () => { vrMode = !vrMode; updateVRMode(); triggerControlsFade(); };

    function updateOffset() {
        const wL = document.getElementById('wrapper-left');
        const wR = document.getElementById('wrapper-right');
        if (vrMode) {
            wL.style.transform = `translateX(-${vrOffset}px)`;
            wR.style.transform = `translateX(${vrOffset}px)`;
        } else {
            wL.style.transform = 'translateX(0)'; wR.style.transform = 'translateX(0)';
        }
    }

    document.getElementById('offset-out').onclick = () => { vrOffset = Math.min(200, vrOffset + 10); updateOffset(); triggerControlsFade(); };
    document.getElementById('offset-in').onclick = () => { vrOffset = Math.max(0, vrOffset - 10); updateOffset(); triggerControlsFade(); };
    document.getElementById('offset-reset').onclick = () => { vrOffset = 0; updateOffset(); triggerControlsFade(); };

    function triggerControlsFade() {
        camControlsPanel.classList.remove('hidden');
        if (hideControlsTimeout) clearTimeout(hideControlsTimeout);
        hideControlsTimeout = setTimeout(() => { camControlsPanel.classList.add('hidden'); }, 4000);
    }

    viewCam.addEventListener('click', (e) => {
        if (!e.target.closest('#controls-panel')) {
            if (camControlsPanel.classList.contains('hidden')) triggerControlsFade();
            else { camControlsPanel.classList.add('hidden'); clearTimeout(hideControlsTimeout); }
        }
    });

    // --- Tab Navigation ---
    document.getElementById('nav-camera').onclick = function() {
        this.classList.add('active'); document.getElementById('nav-builder').classList.remove('active');
        viewCam.classList.add('active'); document.getElementById('view-builder').classList.remove('active');
        triggerControlsFade();
    };
    
    document.getElementById('nav-builder').onclick = function() {
        this.classList.add('active'); document.getElementById('nav-camera').classList.remove('active');
        document.getElementById('view-builder').classList.add('active'); viewCam.classList.remove('active');
        drawWires(); 
    };

    // --- Boot ---
    initBuilder();
    updateVRMode();

    window.addEventListener('resize', drawWires);
    </script>
</body>
