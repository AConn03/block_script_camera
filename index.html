<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Script Camera</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="updateBanner" style="display: none; width: 100%; background: #10b981; color: white; text-align: center; padding: 6px 10px; font-size: 11px; font-weight: bold; cursor: pointer; letter-spacing: 0.5px; z-index: 10000; border-bottom: 1px solid rgba(255,255,255,0.15); transition: background 0.2s;" onclick="location.reload();" onmouseover="this.style.background='#059669'" onmouseout="this.style.background='#10b981'">
        Update is Available
    </div>
    <nav id="top-nav">
        <button class="nav-btn active" id="nav-camera">Camera View</button>
        <button class="nav-btn" id="nav-builder">Script Builder</button>
    </nav>
    
    <div id="view-camera" class="view-container active">
        <div id="video-container">
            <div class="video-wrapper" id="wrapper-left">
                <!-- Added 'muted' to ensure autoplay works seamlessly on mobile devices -->
                <video id="video-left" class="video-feed" autoplay playsinline muted loop></video>
                <div class="canvas-container"><canvas id="canvas-left" class="effect-canvas"></canvas></div>
            </div>
            <div class="video-wrapper" id="wrapper-right">
                <video id="video-right" class="video-feed" autoplay playsinline muted loop></video>
                <div class="canvas-container"><canvas id="canvas-right" class="effect-canvas"></canvas></div>
            </div>
        </div>
        <video id="single-video" autoplay playsinline muted loop></video>
        <div class="canvas-container" id="single-canvas-wrapper"><canvas id="canvas-single" class="effect-canvas"></canvas></div>
        
        <div id="ui-layer"></div>
        <div id="controls-panel">
            <div class="controls-row">
                <button id="start-camera">Start Camera</button>
                <button id="stop-camera" disabled>Stop Camera</button>
                <button id="switch-camera">Switch Camera</button>
                <button id="toggle-vr">Enable VR View</button>
                <input type="file" id="video-upload" accept="video/*" style="display: none;">
                <button id="upload-btn">Upload Video</button>
            </div>
            <div class="controls-row" id="vr-offset-controls" style="display: none;">
                <button id="offset-in">Move Apart</button>
                <button id="offset-out">Move Together</button>
                <button id="offset-reset">Reset Offset</button>
            </div>
            <div class="info-row"><span id="active-script-label">Active Script: Standard</span></div>
        </div>
    </div>

    <div id="view-builder" class="view-container">
        <div id="builder-layout">
            <div id="sidebar-overlay"></div>
            <div class="sidebar" id="palette-panel">
                <div class="panel-title">Categories</div>
                <div id="palette-tabs" class="palette-tabs"></div>
                <hr style="border-color: rgba(255,255,255,0.05); margin: 5px 0 10px 0;">
                <div id="blocks-palette" style="display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex: 1; padding-bottom: 20px;"></div>
            </div>
            
            <div id="workspace-viewport">
                <div id="toast-alert"></div>
                <div id="workspace-inner">
                    <svg id="wires-svg"></svg>
                    <div id="nodes-container"></div>
                </div>
            </div>
            
            <div id="builder-preview"><canvas id="preview-canvas"></canvas></div>
            <div id="mobile-bottom-bar">
                <button id="btn-toggle-palette">➕ Add Node</button>
                <button id="layout-script-btn-main" onclick="window.autoLayoutNodes()">Auto Tree Layout</button>
                <button id="btn-toggle-scripts">📁 Scripts</button>
            </div>
            <div class="sidebar" id="scripts-panel">
                <div class="panel-title">Scripts</div>
                <button id="save-script-btn" style="width: 100%; background: #3b82f6;">Save Graph</button>
                <button id="clear-script-btn" style="width: 100%; margin-top: 10px; background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4);">Clear Workspace</button>
                <hr style="border-color: rgba(255,255,255,0.05); margin: 15px 0;">
                <div id="saved-scripts-list" style="display: flex; flex-direction: column; gap: 0;"></div>
                <div style="font-size: 11px; color: #666; text-align: center; margin-top: auto; padding-top: 20px;">
                    Scroll/pinch to zoom. Drag an output port to an input to connect.
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="save-modal">
        <div class="modal">
            <h3 style="text-align: center; margin-bottom: 10px;">Save Script</h3>
            <input type="text" id="save-script-name" placeholder="Enter script name..." autocomplete="off">
            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
                <button id="cancel-save">Cancel</button>
                <button id="confirm-save" style="background: #3b82f6;">Save</button>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="var-modal">
        <div class="modal">
            <h3 style="text-align: center; margin-bottom: 10px;">Create Variable</h3>
            <input type="text" id="var-name-input" placeholder="Variable name..." autocomplete="off">
            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
                <button id="cancel-var">Cancel</button>
                <button id="confirm-var" style="background: #3b82f6;">Create</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="error-info-modal">
        <div class="modal">
            <h3 style="color: #ef4444; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 24px;">⚠️</span> Node Error
            </h3>
            <div style="font-size: 14px; margin-bottom: 20px; line-height: 1.5;">
                <strong style="color: #888;">System Output:</strong><br>
                <span id="error-msg-text" style="color: #ffb3b3; font-family: monospace;"></span>
            </div>
            <div style="font-size: 14px; margin-bottom: 25px; background: rgba(59, 130, 246, 0.1); padding: 15px; border-radius: 8px; border-left: 4px solid #3b82f6; line-height: 1.5;">
                <strong style="color: #93c5fd;">💡 Suggested Fix:</strong><br>
                <span id="error-sugg-text" style="color: #e2e8f0;"></span>
            </div>
            <div style="display: flex; justify-content: flex-end;">
                <button id="close-error-modal" style="background: #333;">Close</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirm-action-modal">
        <div class="modal">
            <h3 style="text-align: center; color: #ef4444; margin-bottom: 15px;">Clear Workspace?</h3>
            <p style="text-align: center; color: #ccc; margin-bottom: 25px; font-size: 14px;">This will remove all nodes and wires. Unsaved progress will be lost.</p>
            <div style="display: flex; justify-content: center; gap: 15px;">
                <button id="cancel-confirm-action" style="flex: 1;">Cancel</button>
                <button id="execute-confirm-action" style="background: #ef4444; flex: 1;">Clear</button>
            </div>
        </div>
    </div>

    <script src="js/globals.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/updater.js"></script>
</body>
</html>
